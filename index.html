<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPAI — Satellite Data Settlement Protocol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --void:#04060D;
  --deep:#080C18;
  --panel:rgba(10,16,30,0.82);
  --line:rgba(120,160,220,0.10);
  --line2:rgba(120,160,220,0.18);
  --cyan:#3DD6FF;
  --cyan-dim:rgba(61,214,255,0.5);
  --amber:#FFB547;
  --green:#4FFFA8;
  --red:#FF6B6B;
  --violet:#9D7BFF;
  --text:#EAF0FB;
  --muted:rgba(180,196,224,0.55);
  --muted2:rgba(180,196,224,0.32);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--void);}
body{
  font-family:'Space Grotesk',system-ui,sans-serif;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',monospace;}

canvas#globe{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:1;}

/* scanline / grain overlay for "console" feel */
.scan{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,0.04) 3px,transparent 4px);
  opacity:0.5;mix-blend-mode:overlay;
}
.vignette{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(2,4,10,0.55) 100%);
}

/* ── TOP NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1rem 1.6rem;
}
.brand{display:flex;align-items:center;gap:0.7rem;}
.brand-mark{
  width:30px;height:30px;border:1.5px solid var(--cyan);
  border-radius:50%;position:relative;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.brand-mark::before{
  content:'';width:4px;height:4px;border-radius:50%;background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);
}
.brand-mark::after{
  content:'';position:absolute;inset:-4px;border:1px solid var(--cyan-dim);
  border-radius:50%;border-left-color:transparent;border-bottom-color:transparent;
  animation:spin 4s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.brand-name{font-size:1.15rem;font-weight:700;letter-spacing:0.22em;}
.brand-name b{color:var(--cyan);}

.nav-right{display:flex;align-items:center;gap:0.8rem;}

/* language dropdown */
.lang-wrap{position:relative;}
.lang-trigger{
  display:flex;align-items:center;gap:0.4rem;
  background:var(--panel);border:1px solid var(--line2);
  color:var(--text);padding:0.4rem 0.7rem;border-radius:7px;
  font-size:0.72rem;font-weight:500;cursor:pointer;
  font-family:'JetBrains Mono',monospace;letter-spacing:0.05em;
  backdrop-filter:blur(12px);transition:border-color 0.2s;
}
.lang-trigger:hover{border-color:var(--cyan-dim);}
.lang-trigger .chev{font-size:0.6rem;opacity:0.6;}
.lang-menu{
  position:absolute;top:calc(100% + 6px);right:0;
  background:var(--panel);border:1px solid var(--line2);
  border-radius:9px;backdrop-filter:blur(20px);
  overflow:hidden;min-width:140px;
  opacity:0;transform:translateY(-6px);pointer-events:none;
  transition:opacity 0.2s,transform 0.2s;
  box-shadow:0 12px 40px rgba(0,0,0,0.5);
}
.lang-menu.open{opacity:1;transform:translateY(0);pointer-events:all;}
.lang-opt{
  display:flex;align-items:center;gap:0.6rem;
  padding:0.6rem 0.9rem;cursor:pointer;
  font-size:0.8rem;transition:background 0.15s;
  border-bottom:1px solid var(--line);
}
.lang-opt:last-child{border-bottom:none;}
.lang-opt:hover{background:rgba(61,214,255,0.08);}
.lang-opt.active{color:var(--cyan);}
.lang-opt .flag{font-size:1rem;}

/* ── TELEMETRY (left, desktop) ── */
.telemetry{
  position:fixed;top:50%;left:1.6rem;z-index:100;
  transform:translateY(-50%);
  display:flex;flex-direction:column;gap:0;
  pointer-events:none;
  border-left:1px solid var(--line2);
}
.tele-row{
  padding:0.7rem 0 0.7rem 0.9rem;
  position:relative;
}
.tele-row::before{
  content:'';position:absolute;left:-1px;top:50%;transform:translateY(-50%);
  width:1px;height:0;background:var(--cyan);transition:height 0.4s;
}
.tele-row.live::before{height:60%;box-shadow:0 0 8px var(--cyan);}
.tele-val{font-family:'JetBrains Mono',monospace;font-size:1.35rem;font-weight:500;line-height:1;letter-spacing:-0.02em;}
.tele-val .u{color:var(--cyan);font-size:0.8rem;}
.tele-key{font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(190,205,230,0.7);margin-top:0.3rem;}

/* status badge top-left under nav */
.status{
  position:fixed;top:3.6rem;left:1.6rem;z-index:100;
  display:flex;align-items:center;gap:0.45rem;
  font-family:'JetBrains Mono',monospace;
  font-size:0.62rem;font-weight:500;letter-spacing:0.14em;
  color:var(--cyan-dim);pointer-events:none;
}
.status .pulse{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse 1.8s infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.25;}}

/* ── TELEMETRY FEED (right) ── */
.feed{
  position:fixed;right:1.6rem;top:50%;transform:translateY(-50%);
  z-index:100;display:flex;flex-direction:column;gap:0.4rem;
  pointer-events:none;width:240px;
}
.feed-title{
  font-family:'JetBrains Mono',monospace;
  font-size:0.58rem;letter-spacing:0.16em;text-transform:uppercase;
  color:rgba(190,205,230,0.6);margin-bottom:0.2rem;text-align:right;
}
.feed-item{
  display:flex;align-items:center;gap:0.5rem;
  background:var(--panel);border:1px solid var(--line);
  border-left:2px solid var(--green);
  border-radius:0 7px 7px 0;
  padding:0.45rem 0.7rem;font-size:0.66rem;
  backdrop-filter:blur(10px);
  font-family:'JetBrains Mono',monospace;
  animation:feedin 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes feedin{from{transform:translateX(12px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.feed-sat{color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.feed-amt{color:var(--cyan);font-weight:500;flex-shrink:0;}

/* hint */
.hint{
  position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);
  z-index:100;pointer-events:none;
  font-family:'JetBrains Mono',monospace;
  font-size:0.64rem;letter-spacing:0.12em;color:var(--muted2);
  display:flex;align-items:center;gap:0.5rem;
}
.hint .reticle{
  width:12px;height:12px;border:1px solid var(--cyan-dim);border-radius:50%;
  position:relative;animation:pulse 2s infinite;
}
.hint .reticle::before,.hint .reticle::after{
  content:'';position:absolute;background:var(--cyan-dim);
}
.hint .reticle::before{left:50%;top:-3px;width:1px;height:18px;transform:translateX(-50%);}
.hint .reticle::after{top:50%;left:-3px;height:1px;width:18px;transform:translateY(-50%);}

/* ── SAT POPUP ── */
.spop{
  position:fixed;z-index:300;
  background:var(--panel);border:1px solid var(--line2);
  border-radius:12px;padding:0;min-width:228px;
  backdrop-filter:blur(24px);
  opacity:0;transform:scale(0.94);transition:opacity 0.22s,transform 0.22s;
  pointer-events:none;overflow:hidden;
  box-shadow:0 16px 50px rgba(0,0,0,0.6);
}
.spop.show{opacity:1;transform:scale(1);pointer-events:all;}
.spop-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.8rem 1rem;border-bottom:1px solid var(--line);
  background:rgba(61,214,255,0.04);
}
.spop-id{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;color:var(--cyan);}
.spop-x{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:0.9rem;line-height:1;padding:0;}
.spop-x:hover{color:var(--text);}
.spop-body{padding:0.9rem 1rem;}
.spop-name{font-size:1rem;font-weight:600;margin-bottom:0.7rem;}
.spop-row{display:flex;justify-content:space-between;align-items:center;padding:0.32rem 0;font-size:0.74rem;}
.spop-row .k{color:var(--muted);}
.spop-row .v{font-family:'JetBrains Mono',monospace;font-weight:500;}
.spop-row .v.on{color:var(--green);}
.spop-btn{
  margin:0.8rem 1rem 1rem;width:calc(100% - 2rem);
  background:rgba(61,214,255,0.1);border:1px solid var(--cyan-dim);
  color:var(--cyan);padding:0.6rem;border-radius:7px;
  font-family:'Space Grotesk',sans-serif;
  font-size:0.78rem;font-weight:600;cursor:pointer;letter-spacing:0.02em;
  transition:background 0.2s,border-color 0.2s;
}
.spop-btn:hover{background:rgba(61,214,255,0.2);border-color:var(--cyan);}

/* ── BOTTOM TABS ── */
.tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  display:flex;
  background:var(--panel);
  border-top:1px solid var(--line2);
  backdrop-filter:blur(24px);
}
.tab{
  flex:1;padding:0.85rem 0.5rem;
  background:none;border:none;
  color:rgba(195,210,235,0.72);
  font-family:'JetBrains Mono',monospace;
  font-size:0.66rem;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;position:relative;
  transition:color 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:0.35rem;
}
.tab::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:0;height:2px;background:var(--cyan);transition:width 0.3s;
  box-shadow:0 0 8px var(--cyan);
}
.tab.active::before{width:50%;}
.tab.active{color:var(--cyan);}
.tab:hover:not(.active){color:var(--text);}
.tab .ti{
  width:18px;height:18px;opacity:0.9;
}
.tab.active .ti{opacity:1;}

/* ── OVERLAY PANEL ── */
.overlay{
  position:fixed;left:50%;bottom:62px;
  transform:translateX(-50%) translateY(16px);
  width:min(560px,94vw);max-height:64vh;
  background:var(--panel);
  border:1px solid var(--line2);
  border-bottom:none;
  border-radius:16px 16px 0 0;
  backdrop-filter:blur(28px);
  z-index:190;opacity:0;pointer-events:none;
  transition:opacity 0.32s,transform 0.32s;
  display:flex;flex-direction:column;
  box-shadow:0 -8px 60px rgba(0,0,0,0.5);
}
.overlay.open{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;}
.ov-grip{width:38px;height:3px;border-radius:2px;background:var(--line2);margin:0.7rem auto 0;flex-shrink:0;}
.ov-scroll{overflow-y:auto;padding:1.1rem 1.5rem 1.6rem;flex:1;scrollbar-width:thin;scrollbar-color:var(--cyan-dim) transparent;}
.ov-scroll::-webkit-scrollbar{width:3px;}
.ov-scroll::-webkit-scrollbar-thumb{background:var(--cyan-dim);border-radius:2px;}

/* content styles */
.eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;font-weight:500;letter-spacing:0.2em;
  color:var(--cyan);text-transform:uppercase;margin-bottom:0.6rem;
  display:flex;align-items:center;gap:0.5rem;
}
.eyebrow::before{content:'';width:18px;height:1px;background:var(--cyan);}
.h-big{font-size:1.55rem;font-weight:700;line-height:1.12;margin-bottom:0.8rem;letter-spacing:-0.01em;}
.lead{font-size:0.88rem;color:var(--muted);line-height:1.7;margin-bottom:1.3rem;}

.dl-btn{
  display:flex;align-items:center;justify-content:center;gap:0.5rem;
  background:rgba(61,214,255,0.08);border:1px solid var(--cyan-dim);
  color:var(--cyan);padding:0.8rem;border-radius:9px;
  font-weight:600;font-size:0.82rem;text-decoration:none;
  margin-bottom:1.3rem;letter-spacing:0.02em;
  transition:background 0.2s,border-color 0.2s;
}
.dl-btn:hover{background:rgba(61,214,255,0.16);border-color:var(--cyan);}

.card{
  background:rgba(120,160,220,0.03);
  border:1px solid var(--line);
  border-radius:11px;padding:1.1rem;margin-bottom:0.7rem;
  transition:border-color 0.3s,transform 0.3s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;width:2px;height:0;
  background:var(--cyan);transition:height 0.35s;
}
.card:hover{border-color:var(--line2);transform:translateX(2px);}
.card:hover::before{height:100%;}
.card-h{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.4rem;}
.card-ico{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(61,214,255,0.08);border:1px solid var(--line);
  font-size:0.95rem;
}
.card h3{font-size:0.88rem;font-weight:600;}
.card p{font-size:0.79rem;color:var(--muted);line-height:1.6;}

/* tokenomics bars */
.tok-row{display:flex;align-items:center;gap:0.8rem;padding:0.6rem 0;}
.tok-name{font-size:0.78rem;font-weight:500;width:9.5rem;flex-shrink:0;}
.tok-track{flex:1;height:4px;background:rgba(120,160,220,0.08);border-radius:2px;overflow:hidden;}
.tok-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan),var(--violet));width:0;transition:width 0.9s cubic-bezier(0.4,0,0.2,1);}
.tok-pct{font-family:'JetBrains Mono',monospace;font-size:0.82rem;font-weight:500;color:var(--cyan);width:2.6rem;text-align:right;flex-shrink:0;}
.tok-sub{font-size:0.68rem;color:var(--muted2);margin:-0.2rem 0 0.5rem 0;}

/* roadmap */
.rm{position:relative;padding-left:1.7rem;}
.rm::before{content:'';position:absolute;left:0;top:0.3rem;bottom:0.3rem;width:1px;background:linear-gradient(to bottom,var(--cyan),var(--violet) 55%,var(--line2));}
.rm-item{position:relative;margin-bottom:1.5rem;}
.rm-item:last-child{margin-bottom:0;}
.rm-node{position:absolute;left:-1.7rem;top:0.2rem;width:9px;height:9px;border-radius:50%;transform:translateX(-4px);}
.rm-done .rm-node{background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
.rm-now .rm-node{background:var(--amber);box-shadow:0 0 10px var(--amber);}
.rm-now .rm-node::after{content:'';position:absolute;inset:-5px;border:1px solid var(--amber);border-radius:50%;animation:pulse 1.6s infinite;}
.rm-next .rm-node{background:var(--muted2);}
.rm-phase{font-family:'JetBrains Mono',monospace;font-size:0.6rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.2rem;}
.rm-done .rm-phase{color:var(--cyan);}
.rm-now .rm-phase{color:var(--amber);}
.rm-next .rm-phase{color:var(--muted2);}
.rm-item h4{font-size:0.86rem;font-weight:600;margin-bottom:0.22rem;}
.rm-item p{font-size:0.76rem;color:var(--muted);line-height:1.55;}

/* app / wallet */
.w-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:0.5rem;
  background:rgba(61,214,255,0.1);border:1px solid var(--cyan-dim);
  color:var(--cyan);padding:0.85rem;border-radius:9px;
  font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.85rem;
  cursor:pointer;letter-spacing:0.02em;margin-bottom:1rem;
  transition:background 0.2s,border-color 0.2s;
}
.w-btn:hover{background:rgba(61,214,255,0.18);border-color:var(--cyan);}
.field-label{
  font-family:'JetBrains Mono',monospace;
  font-size:0.62rem;color:var(--muted2);letter-spacing:0.08em;
  display:block;margin-bottom:0.35rem;text-transform:uppercase;
}
.field{
  width:100%;background:rgba(120,160,220,0.04);
  border:1px solid var(--line2);color:var(--text);
  padding:0.7rem 0.85rem;border-radius:8px;
  font-family:'JetBrains Mono',monospace;font-size:0.8rem;
  outline:none;transition:border-color 0.2s;margin-bottom:0.9rem;
}
.field:focus{border-color:var(--cyan-dim);}
.field::placeholder{color:var(--muted2);}
.mint{
  width:100%;background:var(--cyan);color:var(--void);
  border:none;padding:0.9rem;border-radius:9px;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.88rem;
  cursor:pointer;letter-spacing:0.03em;margin-bottom:0.8rem;
  transition:transform 0.2s,box-shadow 0.2s;
}
.mint:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(61,214,255,0.3);}
.note{font-family:'JetBrains Mono',monospace;font-size:0.66rem;color:var(--muted2);text-align:center;line-height:1.7;}
.note a{color:var(--cyan);text-decoration:none;}

/* HERO TITLE (center, behind globe interaction) */
.hero{
  position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);
  z-index:50;text-align:center;pointer-events:none;width:min(680px,90vw);
}
.hero-kicker{
  font-family:'JetBrains Mono',monospace;
  font-size:0.66rem;letter-spacing:0.28em;text-transform:uppercase;
  color:var(--cyan-dim);margin-bottom:1rem;
}
.hero h1{
  font-size:clamp(2.4rem,5.5vw,4.6rem);font-weight:700;line-height:1.0;
  letter-spacing:-0.03em;text-shadow:0 2px 40px rgba(4,6,13,0.8);
}
.hero h1 .accent{color:var(--cyan);}
.hero h1 .ghost{color:var(--muted2);}

@media(max-width:760px){
  .telemetry{
    top:auto;bottom:4.6rem;left:0;right:0;transform:none;
    flex-direction:row;justify-content:space-around;
    border-left:none;border-top:1px solid var(--line2);
    background:var(--panel);backdrop-filter:blur(20px);padding:0.6rem 0.6rem;
  }
  .tele-row{padding:0.3rem 0;text-align:center;flex:1;border-top:1px solid var(--line);}
  .tele-row::before{display:none;}
  .tele-val{font-size:1rem;}
  .tele-key{font-size:0.5rem;letter-spacing:0.1em;}
  .status{top:3.3rem;left:1.2rem;font-size:0.56rem;}
  .feed{display:none;}
  .hint{display:none;}
  .hero{top:34%;}
  .spop{left:1rem!important;right:1rem!important;bottom:13rem!important;top:auto!important;min-width:unset;width:auto;}
  .overlay{max-height:56vh;}
  .tab{font-size:0.58rem;padding:0.7rem 0.3rem;}
  nav{padding:0.9rem 1.1rem;}
  .brand-name{font-size:1rem;}
  .overlay{bottom:58px;}
}
</style>
</head>
<body>
<canvas id="globe"></canvas>
<div class="scan"></div>
<div class="vignette"></div>

<!-- NAV -->
<nav>
  <div class="brand">
    <div class="brand-mark"></div>
    <div class="brand-name">SP<b>AI</b></div>
  </div>
  <div class="nav-right">
    <div class="lang-wrap">
      <button class="lang-trigger" onclick="toggleLangMenu(event)">
        <span class="flag" id="curFlag">🇬🇧</span>
        <span id="curLang">EN</span>
        <span class="chev">▼</span>
      </button>
      <div class="lang-menu" id="langMenu">
        <div class="lang-opt active" onclick="setLang('en')"><span class="flag">🇬🇧</span> English</div>
        <div class="lang-opt" onclick="setLang('ko')"><span class="flag">🇰🇷</span> 한국어</div>
        <div class="lang-opt" onclick="setLang('zh')"><span class="flag">🇨🇳</span> 中文</div>
        <div class="lang-opt" onclick="setLang('ja')"><span class="flag">🇯🇵</span> 日本語</div>
        <div class="lang-opt" onclick="setLang('es')"><span class="flag">🇪🇸</span> Español</div>
        <div class="lang-opt" onclick="setLang('ru')"><span class="flag">🇷🇺</span> Русский</div>
      </div>
    </div>
  </div>
</nav>

<!-- STATUS -->
<div class="status"><span class="pulse"></span><span id="statusTxt">ALEO TESTNET · OPERATIONAL</span></div>

<!-- HERO -->
<div class="hero">
  <div class="hero-kicker" id="heroKicker">SATELLITE DATA SETTLEMENT</div>
  <h1 id="heroTitle"><span class="accent">Orbit</span> the<br>data economy</h1>
</div>

<!-- TELEMETRY LEFT -->
<div class="telemetry">
  <div class="tele-row live"><div class="tele-val">7<span style="font-size:0.45rem;color:var(--amber);letter-spacing:0.12em;margin-left:4px;vertical-align:middle;opacity:0.8;">DEMO</span></div><div class="tele-key" id="t1">Active Satellites</div></div>

  if(curTab===id&&ovl.classList.contains('open')){ovl.classList.remove('open');curTab=null;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));return;}
  curTab=id;renderTab(id);ovl.classList.add('open');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
}

let selSat=null;
function showSat(hit,cx,cy){
  selSat=hit;const t=I18N[lang];
  document.getElementById('spopId').textContent='SAT-'+hit.sat.name;
  document.getElementById('spopName').textContent=hit.sat.name;

function closeSat(){selSat=null;document.getElementById('spop').classList.remove('show');}
function simPay(){

  const mb=(Math.random()*400+50).toFixed(0);

function addFeed(sat,size,cost){
  const list=document.getElementById('feedList');
  const el=document.createElement('div');el.className='feed-item';
  el.innerHTML=`<span class="feed-sat">${sat} · ${size}</span><span class="feed-amt">${cost}</span>`;
  list.insertBefore(el,list.firstChild);
  if(list.children.length>5){const l=list.lastChild;l.style.opacity='0';setTimeout(()=>l.remove(),400);}
}
setInterval(()=>{if(Math.random()>0.5){const s=SATS[Math.floor(Math.random()*SATS.length)];const mb=(Math.random()*300+20).toFixed(0);const cost=(mb*parseFloat(s.price)).toFixed(2);txCount++;document.getElementById('txCount').textContent=txCount;addFeed('SAT-'+s.name,mb+'MB',cost);}},4500);

// ════════════ GLOBE ENGINE ════════════
const canvas=document.getElementById('globe'),ctx=canvas.getContext('2d');
function sz(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}sz();window.addEventListener('resize',sz);
const mob=()=>window.innerWidth<=760;
const CX=()=>canvas.width/2,CY=()=>mob()?canvas.height*0.40:canvas.height*0.5,R=()=>mob()?Math.min(canvas.width,canvas.height)*0.34:Math.min(canvas.width,canvas.height)*0.30;
let rX=0.3,rY=0,dr=false,lx=0,ly=0,vx=0,vy=0.0022,TT=0,touchMoved=false;
let sPos=[];
function pr(x,y,z){const cX=Math.cos(rX),sX=Math.sin(rX),y2=y*cX-z*sX,z2=y*sX+z*cX;return{sx:CX()+x,sy:CY()-y2,depth:z2};}
function ll(lat,lon,r){const a=lat*Math.PI/180,b=(lon+rY*180/Math.PI)*Math.PI/180;return{x:r*Math.cos(a)*Math.cos(b),y:r*Math.sin(a),z:r*Math.cos(a)*Math.sin(b)};}
function satP(sat,t){const inc=sat.inc*Math.PI/180,spd=0.32/(sat.orbit*0.8),a=sat.phase+t*spd,r=R()*sat.orbit;return pr(r*Math.cos(a),r*Math.sin(a)*Math.cos(inc),r*Math.sin(a)*Math.sin(inc));}
const CONTS=[[[72,234],[60,222],[50,230],[38,240],[25,246],[15,248],[10,246],[15,258],[30,248],[48,242],[62,228]],[[-20,298],[-52,290],[-40,300],[-10,322],[0,310],[10,284],[10,278],[0,270],[-10,278]],[[55,355],[52,4],[44,12],[38,14],[36,6],[44,350],[56,8]],[[36,10],[20,38],[0,42],[-34,26],[-34,18],[6,2],[22,356]],[[60,60],[52,100],[44,120],[36,130],[28,118],[18,106],[8,110],[24,120],[40,130],[52,140],[64,100]],[[-16,136],[-28,114],[-38,146],[-34,152],[-18,146]]];
const stars=Array.from({length:220},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.1+0.2,o:Math.random()*0.5+0.12,t:Math.random()*Math.PI*2}));
function frame(){
  if(!dr){rY+=vy;vy=vy*0.998+0.0022*0.002;rX+=vx;vx*=0.95;rX=Math.max(-0.7,Math.min(0.7,rX));}
  TT+=0.011;const r=R();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // stars
  stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x*canvas.width,s.y*canvas.height,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,220,255,${s.o*(0.6+0.4*Math.sin(s.t+TT*0.3))})`;ctx.fill();});
  // atmosphere
  const atm=ctx.createRadialGradient(CX(),CY(),r*0.96,CX(),CY(),r*1.28);atm.addColorStop(0,'rgba(40,120,220,0.06)');atm.addColorStop(0.6,'rgba(30,80,180,0.03)');atm.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(CX(),CY(),r*1.28,0,Math.PI*2);ctx.fillStyle=atm;ctx.fill();
  // globe
  const g=ctx.createRadialGradient(CX()-r*0.22,CY()-r*0.25,0,CX(),CY(),r);g.addColorStop(0,'#12203c');g.addColorStop(0.6,'#0a1426');g.addColorStop(1,'#050d18');
  ctx.beginPath();ctx.arc(CX(),CY(),r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(CX(),CY(),r,0,Math.PI*2);ctx.clip();
  // grid
  for(let lat=-75;lat<=75;lat+=15){const pts=[];for(let lon=-180;lon<=180;lon+=5){const p=ll(lat,lon,r),s=pr(p.x,p.y,p.z);if(s.depth>=0)pts.push(s);}if(pts.length>1){ctx.beginPath();ctx.moveTo(pts[0].sx,pts[0].sy);pts.slice(1).forEach(p=>ctx.lineTo(p.sx,p.sy));ctx.strokeStyle='rgba(61,214,255,0.045)';ctx.lineWidth=0.5;ctx.stroke();}}
  for(let lon=0;lon<360;lon+=15){const pts=[];for(let lat=-90;lat<=90;lat+=5){const p=ll(lat,lon,r),s=pr(p.x,p.y,p.z);if(s.depth>=0)pts.push(s);}if(pts.length>1){ctx.beginPath();ctx.moveTo(pts[0].sx,pts[0].sy);pts.slice(1).forEach(p=>ctx.lineTo(p.sx,p.sy));ctx.strokeStyle='rgba(61,214,255,0.045)';ctx.lineWidth=0.5;ctx.stroke();}}
  // continents
  CONTS.forEach(c=>{const pts=c.map(([la,lo])=>{const p=ll(la,lo,r);return pr(p.x,p.y,p.z);}).filter(p=>p.depth>=-r*0.1);if(pts.length<3)return;ctx.beginPath();ctx.moveTo(pts[0].sx,pts[0].sy);pts.slice(1).forEach(p=>ctx.lineTo(p.sx,p.sy));ctx.closePath();ctx.fillStyle='rgba(61,214,255,0.06)';ctx.strokeStyle='rgba(61,214,255,0.12)';ctx.lineWidth=0.6;ctx.fill();ctx.stroke();});
  ctx.restore();
  // edge glow
  ctx.beginPath();ctx.arc(CX(),CY(),r,0,Math.PI*2);ctx.strokeStyle='rgba(61,214,255,0.16)';ctx.lineWidth=1;ctx.stroke();
  // terminator shadow
  const sh=ctx.createRadialGradient(CX()+r*0.3,CY()+r*0.3,0,CX()+r*0.3,CY()+r*0.3,r*1.4);sh.addColorStop(0,'transparent');sh.addColorStop(1,'rgba(2,4,10,0.5)');
  ctx.save();ctx.beginPath();ctx.arc(CX(),CY(),r,0,Math.PI*2);ctx.clip();ctx.fillStyle=sh;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore();
  // orbits
  SATS.forEach(sat=>{const inc=sat.inc*Math.PI/180,or=R()*sat.orbit;ctx.beginPath();let f=true;for(let i=0;i<=360;i+=4){const a=i*Math.PI/180,x=or*Math.cos(a),y=or*Math.sin(a)*Math.cos(inc),z=or*Math.sin(a)*Math.sin(inc),p=pr(x,y,z);if(p.depth<-or*0.2){f=true;continue;}if(f){ctx.moveTo(p.sx,p.sy);f=false;}else ctx.lineTo(p.sx,p.sy);}ctx.strokeStyle='rgba(61,214,255,0.06)';ctx.lineWidth=0.7;ctx.stroke();});
  // satellites
  sPos=[];
  SATS.forEach((sat,i)=>{const p=satP(sat,TT);if(p.depth<-R()*0.1)return;const isS=selSat&&selSat.i===i;
    if(isS){ctx.beginPath();ctx.arc(p.sx,p.sy,10+Math.sin(TT*5)*3,0,Math.PI*2);ctx.strokeStyle=`rgba(255,181,71,${0.4+Math.sin(TT*5)*0.2})`;ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.moveTo(p.sx,p.sy);ctx.lineTo(CX(),CY());ctx.strokeStyle='rgba(255,181,71,0.12)';ctx.lineWidth=1;ctx.setLineDash([3,5]);ctx.stroke();ctx.setLineDash([]);}
    ctx.beginPath();ctx.arc(p.sx,p.sy,isS?5:3.4,0,Math.PI*2);ctx.fillStyle=isS?'#FFB547':'#3DD6FF';ctx.shadowColor=isS?'#FFB547':'#3DD6FF';ctx.shadowBlur=isS?12:6;ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle=isS?'rgba(255,181,71,0.9)':'rgba(61,214,255,0.5)';ctx.font=`${isS?500:400} 8px 'JetBrains Mono',monospace`;ctx.fillText(sat.name,p.sx+8,p.sy+3);
    sPos.push({sx:p.sx,sy:p.sy,sat,i});});
  requestAnimationFrame(frame);
}
frame();

// drag + click
canvas.addEventListener('mousedown',e=>{dr=true;lx=e.clientX;ly=e.clientY;vx=0;vy=0;});
window.addEventListener('mousemove',e=>{if(!dr)return;const dx=e.clientX-lx,dy=e.clientY-ly;vy=dx*0.004;vx=dy*0.004;rY+=dx*0.004;rX+=dy*0.004;rX=Math.max(-0.7,Math.min(0.7,rX));lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup',()=>dr=false);
canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;let hit=null;sPos.forEach(s=>{if(Math.hypot(s.sx-mx,s.sy-my)<16)hit=s;});if(hit)showSat(hit,e.clientX,e.clientY);else closeSat();});
canvas.addEventListener('touchstart',e=>{dr=true;touchMoved=false;lx=e.touches[0].clientX;ly=e.touches[0].clientY;vx=0;vy=0;e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{if(!dr)return;const dx=e.touches[0].clientX-lx,dy=e.touches[0].clientY-ly;if(Math.abs(dx)>4||Math.abs(dy)>4)touchMoved=true;vy=dx*0.004;vx=dy*0.004;rY+=dx*0.004;rX+=dy*0.004;rX=Math.max(-0.7,Math.min(0.7,rX));lx=e.touches[0].clientX;ly=e.touches[0].clientY;e.preventDefault();},{passive:false});
window.addEventListener('touchend',e=>{dr=false;if(!touchMoved&&e.changedTouches.length){const r=canvas.getBoundingClientRect(),mx=e.changedTouches[0].clientX-r.left,my=e.changedTouches[0].clientY-r.top;let hit=null;sPos.forEach(s=>{if(Math.hypot(s.sx-mx,s.sy-my)<22)hit=s;});if(hit)showSat(hit,e.changedTouches[0].clientX,e.changedTouches[0].clientY);}});

// init
setLang('en');
</script>
