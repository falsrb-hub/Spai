<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPAI — Space AI Token</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#030508;}
body{font-family:'Segoe UI',system-ui,sans-serif;color:#E8F0FF;}

canvas#globe{position:fixed;inset:0;width:100%;height:100%;display:block;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 2rem;
}
.logo{font-size:1.1rem;font-weight:900;letter-spacing:0.2em;color:#00E5FF;}
.nav-right{display:flex;align-items:center;gap:1rem;}
.lang-toggle{display:flex;gap:0.3rem;}
.lang-btn{background:rgba(3,5,10,0.6);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.35);padding:0.25rem 0.6rem;border-radius:4px;font-size:0.7rem;font-weight:600;cursor:pointer;transition:all 0.2s;backdrop-filter:blur(8px);}
.lang-btn.active{background:rgba(0,229,255,0.1);border-color:rgba(0,229,255,0.3);color:#00E5FF;}

/* BOTTOM NAV TABS */
.bottom-tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  display:flex;
  background:rgba(3,5,10,0.8);
  border-top:1px solid rgba(0,229,255,0.08);
  backdrop-filter:blur(20px);
}
.btab{
  flex:1;padding:1rem 0.5rem;
  background:none;border:none;
  color:rgba(255,255,255,0.25);
  font-size:0.72rem;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;
  cursor:pointer;
  border-top:2px solid transparent;
  transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:0.3rem;
}
.btab .ico{font-size:1.1rem;}
.btab.active{color:#00E5FF;border-top-color:#00E5FF;}
.btab:hover:not(.active){color:rgba(255,255,255,0.5);}

/* OVERLAY PANEL */
.overlay{
  position:fixed;
  left:50%;bottom:72px;
  transform:translateX(-50%) translateY(20px);
  width:min(520px, 92vw);
  max-height:65vh;
  background:rgba(3,5,10,0.88);
  border:1px solid rgba(0,229,255,0.12);
  border-radius:16px 16px 0 0;
  backdrop-filter:blur(24px);
  z-index:190;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s,transform 0.3s;
  display:flex;flex-direction:column;
}
.overlay.open{
  opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;
}
.overlay-handle{
  width:36px;height:3px;border-radius:2px;
  background:rgba(255,255,255,0.12);
  margin:0.8rem auto 0;flex-shrink:0;
}
.overlay-scroll{overflow-y:auto;padding:1.2rem 1.5rem 1.5rem;flex:1;scrollbar-width:thin;scrollbar-color:rgba(0,229,255,0.1) transparent;}
.overlay-scroll::-webkit-scrollbar{width:3px;}
.overlay-scroll::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.1);}

/* HUD — PC: 왼쪽 세로 / 모바일: 상단 가로 */
.hud-tl{
  position:fixed;top:4.5rem;left:2rem;z-index:100;
  display:flex;flex-direction:column;gap:1rem;pointer-events:none;
}
.hi{border-left:1px solid rgba(0,229,255,0.18);padding-left:0.7rem;}
.hv{font-size:1.1rem;font-weight:800;color:#E8F0FF;line-height:1;}
.hv em{color:#00E5FF;font-style:normal;font-size:0.75rem;}
.hk{font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.22);margin-top:0.15rem;}
.live{position:fixed;top:4.5rem;right:2rem;display:flex;align-items:center;gap:0.4rem;font-size:0.68rem;font-weight:600;letter-spacing:0.1em;color:rgba(0,229,255,0.5);z-index:100;pointer-events:none;}
.ldot{width:5px;height:5px;border-radius:50%;background:#00FF94;box-shadow:0 0 5px #00FF94;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* TX feed — PC: 오른쪽 중앙 / 모바일: 하단 위 */
.txf{
  position:fixed;right:2rem;top:50%;transform:translateY(-50%);
  z-index:100;display:flex;flex-direction:column;gap:0.35rem;
  pointer-events:none;max-width:220px;
}
.txi{display:flex;align-items:center;gap:0.5rem;background:rgba(3,5,10,0.7);border:1px solid rgba(0,229,255,0.08);border-radius:7px;padding:0.4rem 0.7rem;font-size:0.7rem;backdrop-filter:blur(8px);animation:si 0.35s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes si{from{transform:translateX(10px);opacity:0}to{transform:translateX(0);opacity:1}}
.tdg{width:4px;height:4px;border-radius:50%;background:#00FF94;flex-shrink:0;}
.ttt{color:rgba(232,240,255,0.5);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tamt{color:#00E5FF;font-weight:700;flex-shrink:0;}

/* ── MOBILE ── */
@media(max-width:600px){
  /* HUD → 하단 가로 행으로 (탭 바로 위) */
  .hud-tl{
    top:auto;left:0;right:0;bottom:4.8rem;
    flex-direction:row;justify-content:space-around;
    background:rgba(3,5,10,0.75);
    backdrop-filter:blur(14px);
    border-top:1px solid rgba(0,229,255,0.07);
    padding:0.7rem 0.8rem;
    gap:0;
  }
  .hi{
    border-left:none;border-top:1px solid rgba(0,229,255,0.15);
    padding-left:0;padding-top:0.4rem;
    text-align:center;flex:1;
  }
  .hv{font-size:1rem;}
  /* LIVE badge → nav 아래 왼쪽으로 (EN 버튼이랑 안 겹치게) */
  .live{top:3.5rem;left:1.2rem;right:auto;font-size:0.6rem;}
  /* TX feed → 숨김 (모바일 공간 부족) */
  .txf{display:none;}
  /* Hint → 숨김 (HUD/지구본이랑 겹쳐서) */
  .hint-ctr{display:none;}
  /* SAT POPUP → 화면 하단 고정 (HUD 위) */
  .spop{
    position:fixed!important;
    left:1rem!important;right:1rem!important;
    bottom:13rem!important;top:auto!important;
    min-width:unset;width:auto;
  }
  /* 오버레이 높이 조정 */
  .overlay{max-height:55vh;}
  /* 탭 글자 크기 줄이기 */
  .btab{font-size:0.62rem;padding:0.75rem 0.3rem;}
  .btab .ico{font-size:0.95rem;}
}

/* SAT POPUP */
.spop{
  position:fixed;z-index:300;
  background:rgba(3,5,10,0.9);
  border:1px solid rgba(0,229,255,0.2);
  border-radius:12px;padding:1.1rem 1.3rem;
  min-width:190px;backdrop-filter:blur(20px);
  opacity:0;transform:scale(0.92);transition:all 0.22s;pointer-events:none;
}
.spop.show{opacity:1;transform:scale(1);pointer-events:all;}
.sptag{font-size:0.58rem;font-weight:700;letter-spacing:0.14em;color:#00E5FF;text-transform:uppercase;margin-bottom:0.3rem;}
.spnm{font-size:0.9rem;font-weight:800;margin-bottom:0.7rem;}
.spr{display:flex;justify-content:space-between;font-size:0.73rem;padding:0.28rem 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.spr:last-of-type{border:none;}
.spr span:first-child{color:rgba(255,255,255,0.3);}
.spbtn{margin-top:0.7rem;width:100%;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.22);color:#00E5FF;padding:0.48rem;border-radius:6px;font-size:0.73rem;font-weight:700;cursor:pointer;transition:background 0.2s;}
.spbtn:hover{background:rgba(0,229,255,0.18);}
.spcl{position:absolute;top:0.6rem;right:0.7rem;background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer;font-size:0.85rem;}

/* Hint */
.hint-ctr{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);font-size:0.7rem;letter-spacing:0.1em;color:rgba(255,255,255,0.18);pointer-events:none;animation:fh 3s ease-in-out infinite;z-index:100;}
@keyframes fh{0%,100%{opacity:0.3}50%{opacity:0.9}}

/* CONTENT */
.stag{font-size:0.62rem;font-weight:700;letter-spacing:0.16em;color:#00E5FF;text-transform:uppercase;margin-bottom:0.5rem;}
.sh{font-size:1.45rem;font-weight:900;line-height:1.2;margin-bottom:0.7rem;}
.sp{font-size:0.85rem;color:rgba(232,240,255,0.45);line-height:1.7;margin-bottom:1.2rem;}
.cd{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:9px;padding:1rem;margin-bottom:0.7rem;}
.cd h3{font-size:0.85rem;font-weight:700;margin-bottom:0.25rem;}
.cd p{font-size:0.78rem;color:rgba(232,240,255,0.4);line-height:1.6;}
.cd-ico{font-size:1.1rem;margin-bottom:0.4rem;}
.tokr{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.tokb{flex:1;height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
.tokbi{height:100%;border-radius:2px;background:#00E5FF;}
.tokp{font-size:0.85rem;font-weight:800;color:#00E5FF;width:2.2rem;text-align:right;flex-shrink:0;}
.tokn{font-size:0.78rem;font-weight:600;width:6.5rem;flex-shrink:0;}
.tokd{font-size:0.68rem;color:rgba(255,255,255,0.22);}
.rmi{display:flex;gap:0.8rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid rgba(255,255,255,0.04);}
.rmi:last-child{border:none;}
.rdot{width:8px;height:8px;border-radius:50%;margin-top:0.25rem;flex-shrink:0;}
.rdone .rdot{background:#00E5FF;}
.rnow .rdot{background:#FFD166;box-shadow:0 0 8px #FFD166;}
.rnext .rdot{background:rgba(255,255,255,0.18);}
.rph{font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.2rem;}
.rdone .rph{color:#00E5FF;}.rnow .rph{color:#FFD166;}.rnext .rph{color:rgba(255,255,255,0.22);}
.rmi h4{font-size:0.82rem;font-weight:700;margin-bottom:0.18rem;}
.rmi p{font-size:0.75rem;color:rgba(232,240,255,0.38);line-height:1.55;}
.inpl{font-size:0.68rem;color:rgba(255,255,255,0.28);letter-spacing:0.07em;display:block;margin-bottom:0.3rem;}
.inp3{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#E8F0FF;padding:0.62rem 0.8rem;border-radius:7px;font-size:0.82rem;outline:none;transition:border-color 0.2s;font-family:monospace;margin-bottom:0.75rem;}
.inp3:focus{border-color:rgba(0,229,255,0.3);}
.inp3::placeholder{color:rgba(255,255,255,0.18);}
.mbtn{width:100%;background:#00E5FF;color:#030508;border:none;padding:0.8rem;border-radius:7px;font-weight:900;font-size:0.88rem;cursor:pointer;letter-spacing:0.04em;margin-bottom:0.6rem;transition:opacity 0.2s;}
.mbtn:hover{opacity:0.88;}
.anote{font-size:0.7rem;color:rgba(255,255,255,0.2);text-align:center;line-height:1.6;}
.anote a{color:#00E5FF;text-decoration:none;}
</style>
</head>
<body>
<canvas id="globe"></canvas>

<nav>
  <div class="logo">SPAI</div>
  <div class="nav-right">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('ko')">한국어</button>
    </div>
  </div>
</nav>

<div class="hud-tl">
  <div class="hi"><div class="hv" id="hv1">7</div><div class="hk" id="hk1">Active Satellites</div></div>
  <div class="hi"><div class="hv" id="hv2">0</div><div class="hk" id="hk2">Transactions</div></div>
  <div class="hi"><div class="hv">1<em>B</em></div><div class="hk" id="hk3">Max Supply</div></div>
  <div class="hi"><div class="hv">0<em>%</em></div><div class="hk" id="hk4">Inflation</div></div>
</div>

<div class="live" id="live-badge"><div class="ldot"></div><span id="live-txt">ALEO TESTNET</span></div>

<div class="txf" id="txf"></div>

<div class="hint-ctr" id="hint-txt">Click a satellite</div>

<!-- SAT POPUP -->
<div class="spop" id="spop">
  <button class="spcl" id="spcl">✕</button>
  <div class="sptag">Satellite</div>
  <div class="spnm" id="spnm">—</div>
  <div class="spr"><span id="la">Altitude</span><span id="salt">—</span></div>
  <div class="spr"><span id="lt">Data Type</span><span id="stype">—</span></div>
  <div class="spr"><span id="lp">Rate</span><span id="sprice">—</span></div>
  <div class="spr"><span id="ls">Status</span><span style="color:#00FF94">● Active</span></div>
  <button class="spbtn" id="spbtn">Buy Data with SPAI →</button>
</div>

<!-- OVERLAY PANEL -->
<div class="overlay" id="ovl">
  <div class="overlay-handle"></div>
  <div class="overlay-scroll" id="ovl-content"></div>
</div>

<!-- BOTTOM TABS -->
<div class="bottom-tabs">
  <button class="btab" onclick="openTab('tech',this)"><span class="ico">🛰️</span><span id="bt1">Tech</span></button>
  <button class="btab" onclick="openTab('tok',this)"><span class="ico">📊</span><span id="bt2">Tokenomics</span></button>
  <button class="btab" onclick="openTab('road',this)"><span class="ico">🗺️</span><span id="bt3">Roadmap</span></button>
  <button class="btab" onclick="openTab('app',this)"><span class="ico">🚀</span><span id="bt4">Get SPAI</span></button>
</div>

<script>
const T={
  en:{
    live:'ALEO TESTNET',hk1:'Active Satellites',hk2:'Transactions',hk3:'Max Supply',hk4:'Inflation',
    hint:'Click a satellite',la:'Altitude',lt:'Data Type',lp:'Rate',ls:'Status',spbtn:'Buy Data with SPAI →',
    bt1:'Tech',bt2:'Tokenomics',bt3:'Roadmap',bt4:'Get SPAI',
    tech:`<div class="stag">Technology</div><h2 class="sh">Space data,<br>on-chain.</h2><p class="sp">SPAI is a ZK-privacy protocol for satellite data settlement. Built on Aleo, verifiable AI computation without exposing raw data.</p>
    <div class="cd"><div class="cd-ico">🛰️</div><h3>Satellite Data Layer</h3><p>Agriculture, logistics, and insurance subscribe to data streams and pay in SPAI. Real revenue into the protocol.</p></div>
    <div class="cd"><div class="cd-ico">🔐</div><h3>ZK Privacy (Aleo)</h3><p>Zero-knowledge proofs verify AI computation on-chain without revealing raw inputs.</p></div>
    <div class="cd"><div class="cd-ico">🔥</div><h3>Buyback & Burn</h3><p>40% of protocol revenue auto-buys SPAI and burns it. Supply shrinks as adoption grows.</p></div>
    <div class="cd"><div class="cd-ico">⚡</div><h3>Zero Inflation</h3><p>1B token hard cap. Staking rewards from fee revenue only — not new minting.</p></div>`,
    tok:`<div class="stag">Tokenomics</div><h2 class="sh">Transparent<br>distribution.</h2><p class="sp">1,000,000,000 SPAI total. 72% circulating at TGE. Team locked min 12 months.</p>
    ${[['35%',35,'Public Sale & Liquidity','Unlocked at TGE'],['20%',20,'Ecosystem','DAO governed'],['17%',17,'Community Rewards','Staking'],['12%',12,'Team','12mo cliff + 36mo vest'],['8%',8,'Investors','6mo cliff + 24mo vest'],['8%',8,'Foundation','24mo cliff']].map(([p,w,n,d])=>`<div class="tokr"><span class="tokn">${n}</span><div class="tokb"><div class="tokbi" style="width:${w*2.6}%"></div></div><span class="tokp">${p}</span></div><div class="tokd" style="margin-bottom:0.5rem">${d}</div>`).join('')}`,
    road:`<div class="stag">Roadmap</div><h2 class="sh">Step by step.</h2><p class="sp">Verified milestones, public on-chain.</p>
    <div class="rmi rdone"><div class="rdot"></div><div><div class="rph">✓ Phase 0 — Complete</div><h4>Protocol Foundation</h4><p>Leo smart contracts. mint/transfer. Admin auth. Aleo testnet deployed.</p></div></div>
    <div class="rmi rnow"><div class="rdot"></div><div><div class="rph">→ Phase 1 — Now (Q3 2026)</div><h4>Testnet & Community</h4><p>Web UI launch. Community. First data partner MOU. Security audit.</p></div></div>
    <div class="rmi rnext"><div class="rdot"></div><div><div class="rph">Phase 2 — Q4 2026</div><h4>TGE & Mainnet</h4><p>Token Generation Event. DEX liquidity. First buyback-burn. Enterprise API.</p></div></div>
    <div class="rmi rnext"><div class="rdot"></div><div><div class="rph">Phase 3 — 2027+</div><h4>Global Infrastructure</h4><p>Ag, maritime, disaster verticals. DAO governance. L2 rollup. $5M ARR target.</p></div></div>`,
    app:`<div class="stag">Testnet App</div><h2 class="sh">Get SPAI<br>tokens.</h2><p class="sp">Enter your Aleo wallet address to receive SPAI on testnet.</p>
    <label class="inpl">ALEO WALLET ADDRESS</label><input class="inp3" type="text" placeholder="aleo1..." id="wa"><label class="inpl">AMOUNT (MAX 1,000)</label><input class="inp3" type="number" value="100" min="1" max="1000" id="am">
    <button class="mbtn" onclick="doMint()">Get SPAI →</button><div class="anote">Testnet live · Mainnet 2026<br><a href="https://testnet.explorer.provable.com/program/spai_token_v2.aleo" target="_blank">View contract →</a></div>`,
  },
  ko:{
    live:'알레오 테스트넷',hk1:'활성 위성',hk2:'트랜잭션',hk3:'최대 발행량',hk4:'인플레이션',
    hint:'위성을 클릭하세요',la:'고도',lt:'데이터 유형',lp:'단가',ls:'상태',spbtn:'SPAI로 데이터 구매 →',
    bt1:'기술',bt2:'토크노믹스',bt3:'로드맵',bt4:'SPAI 받기',
    tech:`<div class="stag">기술 개요</div><h2 class="sh">우주 데이터,<br>온체인으로.</h2><p class="sp">SPAI는 위성 데이터 결제를 위한 ZK 프라이버시 프로토콜. Aleo 기반으로 원시 데이터 없이 AI 연산을 검증합니다.</p>
    <div class="cd"><div class="cd-ico">🛰️</div><h3>위성 데이터 레이어</h3><p>농업, 물류, 보험사가 SPAI로 위성 데이터를 구독합니다.</p></div>
    <div class="cd"><div class="cd-ico">🔐</div><h3>ZK 프라이버시 (Aleo)</h3><p>영지식증명으로 원시 데이터 공개 없이 AI 연산을 온체인 검증.</p></div>
    <div class="cd"><div class="cd-ico">🔥</div><h3>바이백 & 소각</h3><p>프로토콜 매출 40%가 자동으로 SPAI를 매입하고 소각합니다.</p></div>
    <div class="cd"><div class="cd-ico">⚡</div><h3>제로 인플레이션</h3><p>10억개 하드캡. 스테이킹 보상은 수수료 수익에서만 지급.</p></div>`,
    tok:`<div class="stag">토크노믹스</div><h2 class="sh">투명한<br>분배 구조.</h2><p class="sp">총 10억개. TGE 시 72% 즉시 유통. 팀 물량 최소 12개월 락업.</p>
    ${[['35%',35,'퍼블릭 세일 & 유동성','TGE 즉시 유통'],['20%',20,'에코시스템','DAO 관리'],['17%',17,'커뮤니티 리워드','스테이킹 보상'],['12%',12,'팀','12개월 클리프 + 36개월'],['8%',8,'전략 투자자','6개월 클리프 + 24개월'],['8%',8,'재단 & 어드바이저','24개월 클리프']].map(([p,w,n,d])=>`<div class="tokr"><span class="tokn">${n}</span><div class="tokb"><div class="tokbi" style="width:${w*2.6}%"></div></div><span class="tokp">${p}</span></div><div class="tokd" style="margin-bottom:0.5rem">${d}</div>`).join('')}`,
    road:`<div class="stag">로드맵</div><h2 class="sh">단계별 성장.</h2><p class="sp">검증 가능한 마일스톤.</p>
    <div class="rmi rdone"><div class="rdot"></div><div><div class="rph">✓ Phase 0 — 완료</div><h4>프로토콜 기반</h4><p>Leo 스마트컨트랙트. mint/transfer. 관리자 권한. 테스트넷 배포.</p></div></div>

    app:`<div class="stag">테스트넷 앱</div><h2 class="sh">SPAI 토큰<br>받기.</h2><p class="sp">Aleo 지갑 주소를 입력하고 테스트넷 SPAI를 받으세요.</p>

let lang='en', curTab=null;
function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim()===(l==='en'?'EN':'한국어')));
  const t=T[l];
  const $=id=>document.getElementById(id);
  $('live-txt').textContent=t.live; $('hk1').textContent=t.hk1; $('hk2').textContent=t.hk2; $('hk3').textContent=t.hk3; $('hk4').textContent=t.hk4;
  $('hint-txt').textContent=t.hint; $('la').textContent=t.la; $('lt').textContent=t.lt; $('lp').textContent=t.lp; $('ls').textContent=t.ls; $('spbtn').textContent=t.spbtn;
  $('bt1').textContent=t.bt1; $('bt2').textContent=t.bt2; $('bt3').textContent=t.bt3; $('bt4').textContent=t.bt4;
  if(curTab) document.getElementById('ovl-content').innerHTML=t[curTab];
}
function openTab(id,btn){
  const ovl=document.getElementById('ovl');
  if(curTab===id&&ovl.classList.contains('open')){ovl.classList.remove('open');curTab=null;document.querySelectorAll('.btab').forEach(b=>b.classList.remove('active'));return;}
  curTab=id;
  document.getElementById('ovl-content').innerHTML=T[lang][id];
  ovl.classList.add('open');
  document.querySelectorAll('.btab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function doMint(){
  const addr=document.getElementById('wa').value.trim(),amt=document.getElementById('am').value;
  if(!addr.startsWith('aleo1')){alert(lang==='en'?'Enter valid Aleo address':'올바른 주소를 입력하세요');return;}
  const cmd=`leo execute mint ${addr} ${amt}000000u64 --network testnet --broadcast`;
  document.getElementById('ovl-content').innerHTML=`<div style="text-align:center;padding:1.5rem 0">
    <div style="font-size:2rem;margin-bottom:0.8rem">🚀</div>

    <div style="background:rgba(0,0,0,0.4);border:1px solid rgba(0,229,255,0.15);border-radius:8px;padding:0.8rem;font-family:monospace;font-size:0.7rem;text-align:left;word-break:break-all;color:#00E5FF;margin:0.8rem 0">${cmd}</div>
    <button onclick="openTab('app',document.querySelector('.btab.active'))" style="background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);padding:0.5rem 1rem;border-radius:6px;cursor:pointer;font-size:0.78rem">← ${lang==='en'?'Back':'돌아가기'}</button>
  </div>`;
}

// ══ GLOBE (same engine) ══
const canvas=document.getElementById('globe'),ctx=canvas.getContext('2d');
function sz(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}sz();window.addEventListener('resize',sz);
const isMobile=()=>window.innerWidth<=600;
const CX=()=>canvas.width/2,CY=()=>isMobile()?canvas.height*0.40:canvas.height/2,R=()=>isMobile()?Math.min(canvas.width,canvas.height)*0.34:Math.min(canvas.width,canvas.height)*0.38;
let rX=0.25,rY=0,dr=false,lX=0,lY=0,vX=0,vY=0.0025,T2=0;
const SATS=[
  {name:'AGRI-01',type:'Multispectral',typeKo:'다중스펙트럼',alt:'520 km',price:'0.08 SPAI/MB',orbit:1.22,inc:28,phase:0},
  {name:'MARITIME-02',type:'SAR Radar',typeKo:'SAR 레이더',alt:'650 km',price:'0.15 SPAI/MB',orbit:1.35,inc:52,phase:1.2},
  {name:'OPTICAL-03',type:'Optical',typeKo:'광학 영상',alt:'480 km',price:'0.12 SPAI/MB',orbit:1.15,inc:-35,phase:2.4},
  {name:'IR-04',type:'Infrared',typeKo:'적외선',alt:'600 km',price:'0.10 SPAI/MB',orbit:1.28,inc:70,phase:0.8},
  {name:'DISASTER-05',type:'Disaster Mon.',typeKo:'재난감시',alt:'550 km',price:'0.05 SPAI/MB',orbit:1.4,inc:-60,phase:3.5},
  {name:'AI-06',type:'AI Compute',typeKo:'AI 연산',alt:'700 km',price:'0.20 SPAI/MB',orbit:1.18,inc:45,phase:4.2},
  {name:'LOGIS-07',type:'Logistics',typeKo:'물류추적',alt:'580 km',price:'0.09 SPAI/MB',orbit:1.32,inc:-20,phase:5.0},
];
let sPos=[],sSel=null;
function pr(x,y,z){const cX=Math.cos(rX),sX=Math.sin(rX),y2=y*cX-z*sX,z2=y*sX+z*cX;return{sx:CX()+x,sy:CY()-y2,depth:z2};}
function ll(lat,lon,r){const φ=lat*Math.PI/180,λ=(lon+rY*180/Math.PI)*Math.PI/180;return{x:r*Math.cos(φ)*Math.cos(λ),y:r*Math.sin(φ),z:r*Math.cos(φ)*Math.sin(λ)};}
function sp(sat,t){const inc=sat.inc*Math.PI/180,spd=0.35/(sat.orbit*0.8),a=sat.phase+t*spd,r=R()*sat.orbit;return pr(r*Math.cos(a),r*Math.sin(a)*Math.cos(inc),r*Math.sin(a)*Math.sin(inc));}
const CONTS=[[[72,234],[60,222],[50,230],[38,240],[25,246],[15,248],[10,246],[15,258],[30,248],[48,242],[62,228],[70,232]],[[-20,298],[-52,290],[-40,300],[-10,322],[0,310],[10,284],[10,278],[0,270],[-10,278]],[[55,355],[52,4],[44,12],[38,14],[36,6],[44,350],[56,8],[62,10]],[[36,10],[20,38],[0,42],[-34,26],[-34,18],[6,2],[22,356],[36,10]],[[60,60],[52,100],[44,120],[36,130],[28,118],[18,106],[8,110],[24,120],[40,130],[52,140],[64,100]],[[-16,136],[-28,114],[-38,146],[-34,152],[-18,146]]];
const stars=Array.from({length:180},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.1+0.2,op:Math.random()*0.5+0.1,t:Math.random()*Math.PI*2}));
let txCnt=0;
function frame(){
  if(!dr){rY+=vY;vY=vY*0.998+0.0025*0.002;rX+=vX;vX*=0.95;rX=Math.max(-0.7,Math.min(0.7,rX));}
  T2+=0.012;
  const r=R();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x*canvas.width,s.y*canvas.height,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(220,235,255,${s.op*(0.6+0.4*Math.sin(s.t+T2*0.3))})`;ctx.fill();});
  const atm=ctx.createRadialGradient(CX(),CY(),r*0.95,CX(),CY(),r*1.22);atm.addColorStop(0,'rgba(0,100,200,0.05)');atm.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(CX(),CY(),r*1.22,0,Math.PI*2);ctx.fillStyle=atm;ctx.fill();
  const g=ctx.createRadialGradient(CX()-r*0.2,CY()-r*0.25,0,CX(),CY(),r);g.addColorStop(0,'#162038');g.addColorStop(0.6,'#0a1422');g.addColorStop(1,'#040c18');
  ctx.beginPath();ctx.arc(CX(),CY(),r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(CX(),CY(),r,0,Math.PI*2);ctx.clip();
  for(let lat=-75;lat<=75;lat+=20){const pts=[];for(let lon=-180;lon<=180;lon+=5){const p=ll(lat,lon,r),ps=pr(p.x,p.y,p.z);if(ps.depth>=0)pts.push(ps);}if(pts.length>1){ctx.beginPath();ctx.moveTo(pts[0].sx,pts[0].sy);pts.slice(1).forEach(p=>ctx.lineTo(p.sx,p.sy));ctx.strokeStyle='rgba(0,180,255,0.05)';ctx.lineWidth=0.5;ctx.stroke();}}
  for(let lon=0;lon<360;lon+=20){const pts=[];for(let lat=-90;lat<=90;lat+=5){const p=ll(lat,lon,r),ps=pr(p.x,p.y,p.z);if(ps.depth>=0)pts.push(ps);}if(pts.length>1){ctx.beginPath();ctx.moveTo(pts[0].sx,pts[0].sy);pts.slice(1).forEach(p=>ctx.lineTo(p.sx,p.sy));ctx.strokeStyle='rgba(0,180,255,0.05)';ctx.lineWidth=0.5;ctx.stroke();}}
  CONTS.forEach(c=>{const pts=c.map(([la,lo])=>{const p=ll(la,lo,r);return pr(p.x,p.y,p.z);}).filter(p=>p.depth>=-r*0.1);if(pts.length<3)return;ctx.beginPath();ctx.moveTo(pts[0].sx,pts[0].sy);pts.slice(1).forEach(p=>ctx.lineTo(p.sx,p.sy));ctx.closePath();ctx.fillStyle='rgba(0,180,255,0.07)';ctx.strokeStyle='rgba(0,220,255,0.1)';ctx.lineWidth=0.6;ctx.fill();ctx.stroke();});
  ctx.restore();
  ctx.beginPath();ctx.arc(CX(),CY(),r,0,Math.PI*2);ctx.strokeStyle='rgba(0,229,255,0.12)';ctx.lineWidth=1;ctx.stroke();
  SATS.forEach(sat=>{const inc=sat.inc*Math.PI/180,or=R()*sat.orbit;ctx.beginPath();let f=true;for(let i=0;i<=360;i+=4){const a=i*Math.PI/180,x=or*Math.cos(a),y=or*Math.sin(a)*Math.cos(inc),z=or*Math.sin(a)*Math.sin(inc),p=pr(x,y,z);if(p.depth<-or*0.2){f=true;continue;}if(f){ctx.moveTo(p.sx,p.sy);f=false;}else ctx.lineTo(p.sx,p.sy);}ctx.strokeStyle='rgba(0,229,255,0.07)';ctx.lineWidth=0.7;ctx.stroke();});
  sPos=[];
  SATS.forEach((sat,i)=>{const p=sp(sat,T2);if(p.depth<-R()*0.1)return;const iS=sSel&&sSel.i===i;if(iS){ctx.beginPath();ctx.arc(p.sx,p.sy,10+Math.sin(T2*5)*3,0,Math.PI*2);ctx.strokeStyle=`rgba(0,229,255,${0.3+Math.sin(T2*5)*0.15})`;ctx.lineWidth=1;ctx.stroke();}ctx.beginPath();ctx.arc(p.sx,p.sy,iS?5:3.5,0,Math.PI*2);ctx.fillStyle=iS?'#FFD166':'#00E5FF';ctx.fill();ctx.fillStyle=iS?'rgba(255,209,102,0.8)':'rgba(0,229,255,0.45)';ctx.font=`${iS?600:400} 8px monospace`;ctx.fillText(sat.name,p.sx+7,p.sy+3);sPos.push({sx:p.sx,sy:p.sy,sat,i});});
  requestAnimationFrame(frame);
}frame();
canvas.addEventListener('mousedown',e=>{dr=true;lX=e.clientX;lY=e.clientY;vX=0;vY=0;});
window.addEventListener('mousemove',e=>{if(!dr)return;const dx=e.clientX-lX,dy=e.clientY-lY;vY=dx*0.004;vX=dy*0.004;rY+=dx*0.004;rX+=dy*0.004;rX=Math.max(-0.7,Math.min(0.7,rX));lX=e.clientX;lY=e.clientY;});
window.addEventListener('mouseup',()=>dr=false);

let touchMoved=false;
canvas.addEventListener('touchstart',e=>{dr=true;touchMoved=false;lX=e.touches[0].clientX;lY=e.touches[0].clientY;vX=0;vY=0;e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(!dr)return;
  const dx=e.touches[0].clientX-lX,dy=e.touches[0].clientY-lY;
  if(Math.abs(dx)>4||Math.abs(dy)>4) touchMoved=true;
  vY=dx*0.004;vX=dy*0.004;rY+=dx*0.004;rX+=dy*0.004;rX=Math.max(-0.7,Math.min(0.7,rX));lX=e.touches[0].clientX;lY=e.touches[0].clientY;e.preventDefault();
},{passive:false});
window.addEventListener('touchend',e=>{
  dr=false;
  if(!touchMoved&&e.changedTouches.length>0){
    // treat as tap — check satellite hit
    const rect=canvas.getBoundingClientRect();
    const mx=e.changedTouches[0].clientX-rect.left;
    const my=e.changedTouches[0].clientY-rect.top;
    let hit=null;sPos.forEach(s=>{if(Math.hypot(s.sx-mx,s.sy-my)<22)hit=s;});
    if(hit) showSatPopup(hit, e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
});

function showSatPopup(hit, cx, cy){
  sSel=hit;
  const pop=document.getElementById('spop');
  document.getElementById('spnm').textContent='SAT-'+hit.sat.name;
  document.getElementById('salt').textContent=hit.sat.alt;
  document.getElementById('stype').textContent=lang==='en'?hit.sat.type:hit.sat.typeKo;
  document.getElementById('sprice').textContent=hit.sat.price;
  // Smart position — keep popup on screen
  const pw=210, ph=200;
  let px=cx+16, py=cy-ph/2;
  if(px+pw>window.innerWidth) px=cx-pw-16;
  if(py<60) py=60;
  if(py+ph>window.innerHeight-80) py=window.innerHeight-ph-80;
  pop.style.left=px+'px';pop.style.top=py+'px';
  pop.classList.add('show');
}

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let hit=null;sPos.forEach(s=>{if(Math.hypot(s.sx-mx,s.sy-my)<16)hit=s;});
  if(hit) showSatPopup(hit, e.clientX, e.clientY);
});
document.getElementById('spcl').addEventListener('click',()=>{sSel=null;document.getElementById('spop').classList.remove('show');});
document.getElementById('spbtn').addEventListener('click',()=>{
  if(!sSel)return;
  const mb=(Math.random()*400+50).toFixed(0),cost=(mb*parseFloat(sSel.sat.price)).toFixed(2);
  txCnt++;document.getElementById('hv2').textContent=txCnt;
  addTx(`SAT-${sSel.sat.name}`,`${mb}MB`,`${cost} SPAI`);
  sSel=null;document.getElementById('spop').classList.remove('show');
});
function addTx(s,sz,c){
  const f=document.getElementById('txf');
  const el=document.createElement('div');el.className='txi';
  el.innerHTML=`<div class="tdg"></div><span class="ttt">${s} · ${sz}</span><span class="tamt">${c}</span>`;
  f.insertBefore(el,f.firstChild);if(f.children.length>5){const l=f.lastChild;l.style.opacity='0';setTimeout(()=>l.remove(),500);}
}
setInterval(()=>{if(Math.random()>0.45){const s=SATS[Math.floor(Math.random()*SATS.length)],mb=(Math.random()*300+20).toFixed(0),c=(mb*parseFloat(s.price)).toFixed(2);txCnt++;document.getElementById('hv2').textContent=txCnt;addTx('SAT-'+s.name,mb+'MB',c+' SPAI');}},4500);
</script>
